model_list:
  - model_name: message_triage
    litellm_params:
      model: deepinfra/meta-llama/Meta-Llama-3.1-8B-Instruct
      api_key: os.environ/DEEPINFRA_API_KEY

  - model_name: task_extractor
    litellm_params:
      model: deepinfra/meta-llama/Meta-Llama-3.1-8B-Instruct
      api_key: os.environ/DEEPINFRA_API_KEY

  - model_name: guest_reply_draft
    litellm_params:
      model: deepinfra/meta-llama/Meta-Llama-3.1-70B-Instruct
      api_key: os.environ/DEEPINFRA_API_KEY

  - model_name: report_writer
    litellm_params:
      model: deepinfra/meta-llama/Meta-Llama-3.1-8B-Instruct
      api_key: os.environ/DEEPINFRA_API_KEY

  - model_name: risk_review
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 25

litellm_settings:
  drop_params: true
  set_verbose: false
