name: CI

on:
  push:
    # claude/great-edison-3zqpZ is the branch Railway auto-deploys from — CI must
    # run exactly where production commits land. Push-only, ONCE per commit: the
    # branch has a long-lived open PR, so a pull_request trigger would run every
    # push a SECOND time against the PR merge ref (observed duplicate runs) —
    # the push run tests the exact tree Railway ships, which is the true signal.
    branches: ["main", "claude/great-edison-3zqpZ"]
  workflow_dispatch:

# cancel-in-progress drops superseded runs when commits land in quick succession
# (the older run shows as "cancelled" — expected, not a failure).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Note: whether Railway waits for this CI is a RAILWAY PANEL setting ("Wait for
# CI") — verify it there, not here. If it is off, a red run never blocks the
# deploy (regressions surface but ship); if on, red blocks. Keep this comment
# claim-free so it can't drift from the panel state.
jobs:
  verify:
    runs-on: ubuntu-latest
    # Debian container runs as root, which the integration test global-setup
    # needs (it provisions its own PostgreSQL on :5433 via `su postgres`).
    container:
      image: node:20-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL (for the integration test harness)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends postgresql postgresql-contrib sudo
          rm -rf /var/lib/apt/lists/*

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

  # The gap the test harness can't catch: it uses `prisma db push`, so a broken
  # or drifting MIGRATION chain only surfaces at deploy (`migrate deploy` at
  # boot). Replay 00→N on a fresh Postgres, then assert migrations ↔
  # schema.prisma have ZERO drift — the same protocol done by hand until now.
  migration-chain:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Create chain + shadow databases
        run: |
          psql "postgresql://postgres@localhost:5432/postgres" -c 'CREATE DATABASE chain;'
          psql "postgresql://postgres@localhost:5432/postgres" -c 'CREATE DATABASE shadow;'
      - name: migrate deploy 00→N on a fresh database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/chain
      - name: Zero-drift check (migrations ↔ schema.prisma)
        run: >-
          npx prisma migrate diff
          --from-migrations ./prisma/migrations
          --to-schema-datamodel ./prisma/schema.prisma
          --shadow-database-url postgresql://postgres@localhost:5432/shadow
          --exit-code

  # E2E smoke (Codex gate): the REAL production build served against a seeded
  # Postgres — catches "app doesn't boot / landing 500s / auth broken end-to-end",
  # which no unit test sees. Kept tiny (2 tests) so it stays fast and unflaky.
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/e2e
      # A real (non-placeholder) secret — the production boot assertion refuses
      # the dev placeholder by design.
      AUTH_SECRET: ci-e2e-secret-not-used-outside-this-job-42
      # The production boot gate now REQUIRES a mail provider (verify-env). This
      # job never sends mail (2-test smoke), so give it a dummy key purely to
      # satisfy the gate — it is NOT a real Resend key and no send path runs here.
      RESEND_API_KEY: ci-e2e-provider-not-used
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Create + migrate + seed the E2E database
        run: |
          psql "postgresql://postgres@localhost:5432/postgres" -c 'CREATE DATABASE e2e;'
          npx prisma migrate deploy
          npx tsx prisma/seed.ts
      - name: Build (production)
        run: npm run build
      - name: Playwright smoke
        run: npx playwright test

  # Production build gate (DB-free — dummy env values satisfy module-level env
  # readers; nothing connects at build time).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: next build (via npm script — includes prisma generate)
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/build_dummy
          AUTH_SECRET: ci-build-only-secret-not-used-anywhere-42
